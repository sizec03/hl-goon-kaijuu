<style>
  /* tokens inherited from the HL app (HUMAN mode) */
  :root{
    --paper:#E7E7E1; --sheet:#F1F1EC; --stage:#0e0e11;
    --ink:#191a1d; --sub:#74746d; --faint:#9a9a92;
    --hair:#d2d2cb; --hair2:#e1e1da;
    --accent:#0000ff;
    --mono:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{overflow-x:hidden}
  body{
    background:var(--paper);color:var(--ink);
    font:400 13px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100vh;
  }
  ::selection{background:var(--accent);color:#fff}

  /* top header: app brand mark, left only, no rule */
  .top{padding:20px 22px;position:absolute;top:0;left:0;z-index:5}
  .mk{display:flex;align-items:center;gap:6px;font:700 26px/1 var(--sans);letter-spacing:.02em}
  .mk .mkhl{height:1.008em;width:auto;display:block}
  .mk .mksub{margin-left:4px;font:400 12px/1.2 var(--mono);letter-spacing:.06em;color:var(--sub)}

  .stage{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:32px 24px;
  }
  /* lead + 16:9 + statement を縦のセンターにまとめて配置 */
  .center{display:flex;flex-direction:column;align-items:center}
  .lead{margin-bottom:20px;width:max-content;max-width:92vw}
  .lead .l1{display:flex;flex-direction:column;align-items:center;gap:6px;font:500 15px/1.2 var(--sans);letter-spacing:0;color:var(--ink)}
  .lead .l2{margin-top:11px;font:400 11px/1.2 var(--sans);letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
  /* statement under the 16:9, centered, small, same color as Lyric Video Generator */
  .statement{margin-top:26px;
    width:max-content;max-width:92vw;display:flex;flex-direction:column;align-items:center;gap:6px;
    font:400 9px/1.2 var(--sans);letter-spacing:.02em;color:var(--sub);text-align:center}
  .statement .st-gap{margin-top:11px}
  /* per-character lead motion */
  .ch{display:inline-block;transform-origin:50% 50%;will-change:transform}
  /* 黒ベタを1文字ごとに付与して文字と一緒に動かす */
  .lead .ch,.statement .ch,.howto .ch{background:#000;padding:.1em .04em;margin:0 -.005em}
  .lead .hl,.statement .hl,.howto .hl,.howtag{background:transparent;padding:0}
  .ch>i{display:inline-block;font-style:normal;transform-origin:50% 100%;will-change:transform}
  /* 青ボックス（白文字×青背景）— 1文字ごと */
  .hl{display:inline;background:#000;color:#fff;box-decoration-break:clone;-webkit-box-decoration-break:clone;padding:.1em .16em}
  .en{font-family:var(--sans)}
  /* 遊び方 */
  .howto{margin-top:30px;display:flex;flex-direction:column;gap:16px;align-items:center;max-width:92vw}
  .howrow{display:flex;flex-direction:column;align-items:center;gap:3.5px}
  .howtag{display:inline-block;background:transparent;color:#fff;font:500 9px/1 var(--sans);letter-spacing:0;padding:0}
  .howdesc{display:flex;flex-direction:column;align-items:center;gap:5px;font:400 9px/1.2 var(--sans);letter-spacing:.02em;color:var(--sub);text-align:center}

  /* center 16:9 : B&W coarse-pixel HL clip */
  .ref{display:inline-flex;background:none;border:0;cursor:pointer;padding:0;margin-top:2px}
  .frame{
    width:min(78vw,300px);aspect-ratio:16/9;
    border:2px solid var(--faint);background:#000;
    overflow:hidden;display:flex;align-items:center;justify-content:center;
    transition:border-color .12s;
  }
  .ref:hover .frame,.ref:focus-visible .frame{outline:4px solid var(--accent);outline-offset:6px}
  #clip{
    width:100%;height:100%;object-fit:cover;display:block;background:#000;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }

  .foot{
    display:flex;justify-content:space-between;align-items:flex-end;
    padding:20px 22px;
    font:400 10px/1.2 var(--mono);letter-spacing:.06em;color:var(--sub);
  }
  .foot .r{color:var(--faint);letter-spacing:.1em}

  :focus-visible{outline:none}

  /* transition: blue fills bottom -> top to full screen, THEN the screen changes */
  #wipeK,#wipeB{position:fixed;inset:0;transform:scaleY(0);z-index:30;pointer-events:none}
  #wipeK{background:#000;transform-origin:top}                         /* 黒：上→下 */
  #wipeB{background:var(--accent);transform-origin:bottom;z-index:31}  /* 青：下→上（黒の後） */
  #wipeK.run{animation:fillY .42s cubic-bezier(.6,0,.25,1) forwards}
  #wipeB.run{animation:fillYb .42s cubic-bezier(.6,0,.25,1) forwards}
  #warn{position:fixed;inset:0;z-index:32;display:grid;place-items:center;text-align:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .28s ease}
  #warn.show{opacity:1}
  #warn .warn-in{color:#fff;max-width:min(86vw,520px);margin:0 auto}
  #warn .warn-lab{font:600 9.9px/1 var(--sans);letter-spacing:-.01em;text-transform:uppercase;margin-bottom:12px;opacity:1}
  #warn .warn-t{font:400 8.1px/1.85 var(--sans);letter-spacing:-.01em;margin:0 0 4px}
  #warn .warn-s{font:400 8.1px/1.85 var(--sans);letter-spacing:-.01em;margin:0;opacity:1}
  @keyframes fillY{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  @keyframes fillYb{from{transform:scaleY(0)}to{transform:scaleY(1)}}  /* 青も全面（最初の状態） */
  @media(prefers-reduced-motion:reduce){#wipeK.run,#wipeB.run{animation-duration:.01s}}

<script>
/* START / center click -> DEST. 完成版の生成アプリができたら DEST を差し替え。 */
const DEST = "app.html";
(function(){
  "use strict";
  const clip=document.getElementById("clip");
  const ref=document.getElementById("ref");
  const wipeK=document.getElementById("wipeK"), wipeB=document.getElementById("wipeB");
  const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ── lead text headbang : per-character ──
     アプリの MOTION STYLE(applyMotion) を移植・組合せた 10 パターン。
     サイトを開くたびに1つをランダム選択。速さ・easing はアプリ準拠(speed7 / "ease")。 */
  const SP    = 7;      // ← 速さ（アプリ準拠）
  const PHASE = 0.2;    // ← バラつき（文字ごとの位相ずれ）
  const FB_AMP= 0.72;   // ← フィードバック(横スタッター)の強さ
  const POP_AMP=0.4, POP_SPEED=7, POP_STEP=0.6;   // ← 各文字が順々に手前へせり出す波（一つ前にする効果）
  const lead=document.querySelector(".lead");
  const cells=[];
  (function wrapChars(){
    let k=0;
    function wrapEl(el, small){
      if(!el) return;
      const nodes=Array.prototype.slice.call(el.childNodes);
      el.textContent="";
      for(const node of nodes){
        if(node.nodeType===3){
          for(const c of node.textContent){
            const s=document.createElement("span"); s.className="ch";
            const it=document.createElement("i"); it.textContent = (c===" ") ? "\u00A0" : c;
            s.appendChild(it); el.appendChild(s);
            cells.push({o:s,i:it,k:k++,small:small});
          }
        } else if(node.nodeName==="BR"){
          el.appendChild(document.createElement("br"));   // 改行を維持
        } else {
          el.appendChild(node); wrapEl(node, small);   // 子要素(.en等)も再帰分割→全文字を動かす
        }
      }
    }
    lead.querySelectorAll(".hl").forEach(function(el){wrapEl(el,false);});
    document.querySelectorAll(".statement .hl").forEach(function(el){wrapEl(el,true);});   // ステートメントもヘッドバン（控えめ）
    document.querySelectorAll(".howto .hl").forEach(function(el){wrapEl(el,true);});   // 遊び方（MOVIE/LYRICより下）もヘッドバン
    document.querySelectorAll(".howtag").forEach(function(el){wrapEl(el,true);});   // MOVIE/LYRIC タグもヘッドバン
  })();
  const sh=ph=>{const s=Math.sin(ph);return Math.sign(s)*Math.pow(Math.abs(s),0.7);}; // easing "ease"
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const nodFn=(o,ph,k)=>{const nod=0.5+0.5*sh(ph);const ang=nod*(Math.PI/2)*Math.min(1,o.amp);o.syb*=Math.max(.06,Math.cos(ang));};

  /* ── 10 headbang patterns (アプリの MOTION STYLE を移植・組合せ) ── */
  const PATTERNS=[
    {name:"縦/バラ＋フィードバック",   scatter:true,  amp:0.72, fb:true,  fn:(o,ph,k)=>{nodFn(o,ph,k);}},
    {name:"縦/同時＋モッシュ",         scatter:false, amp:0.82, fb:false, fn:(o,ph,k)=>{nodFn(o,ph,k);o.dy+=-Math.abs(sh(ph))*16*o.amp;}},
    {name:"モッシュ＋縦/バラ",         scatter:true,  amp:0.82, fb:false, fn:(o,ph,k)=>{o.dy+=-Math.abs(sh(ph))*16*o.amp;nodFn(o,ph,k);}},
    {name:"クラウドサーフ＋縦/バラ",   scatter:true,  amp:0.8,  fb:false, fn:(o,ph,k)=>{o.dy+=sh(ph)*14*o.amp;nodFn(o,ph,k);}},
    {name:"クラウドサーフ＋縦/同時＋FB",scatter:false, amp:0.8,  fb:true,  fn:(o,ph,k)=>{o.dy+=sh(ph)*14*o.amp;nodFn(o,ph,k);}},
    {name:"シャウト＋縦/バラ",         scatter:true,  amp:0.8,  fb:false, fn:(o,ph,k)=>{o.syb*=(1+sh(ph)*0.3*o.amp);nodFn(o,ph,k);}},
    {name:"ダブルベース＋縦/同時",     scatter:false, amp:0.85, fb:false, fn:(o,ph,k)=>{o.syb*=(1+sh(ph)*0.12*o.amp);nodFn(o,ph,k);}},
    {name:"トレモロ＋縦/同時＋FB",     scatter:false, amp:0.8,  fb:true,  fn:(o,ph,k)=>{nodFn(o,ph,k);o.syb*=(1+sh(ph)*0.18*o.amp);}},
    {name:"トレモロ＋縦/バラ",         scatter:true,  amp:0.8,  fb:false, fn:(o,ph,k)=>{nodFn(o,ph,k);o.syb*=(1+sh(ph)*0.18*o.amp);}},
    {name:"ブラストビート＋縦/バラ",   scatter:true,  amp:0.8,  fb:false, fn:(o,ph,k,time)=>{nodFn(o,ph,k);const r=mulberry32(((k*131)|0)^((time*60*SP)|0));o.dy+=(r()*2-1)*9*o.amp;}},
  ];

  /* サイトを開くたびにランダムで1パターン */
  const _SC = PATTERNS.filter(function(p){return p.scatter;}); const P = (_SC.length?_SC:PATTERNS)[Math.floor(Math.random()*((_SC.length?_SC:PATTERNS).length))];

  let t0=null;
  function headbang(now){
    if(t0==null)t0=now; const time=(now-t0)/1000;
    const tb=(time*8*SP)|0;                                  // フィードバックの時間バケット
    for(const cell of cells){
      const ph = P.scatter ? (time*SP*2.2 - cell.k*PHASE*2.0) : (time*SP*2.2);
      const o={dx:0,dy:0,syb:1,amp:P.amp,rot:0};
      P.fn(o,ph,cell.k,time);
      o.rot += sh(ph)*8*o.amp;   // ＋α: 首振り回転（縦バラと同位相でスタッガー）
      if(P.fb){const r=mulberry32(((cell.k*977)|0)^tb); if(r()>.7) o.dx+=(r()*2-1)*18*FB_AMP;}  // フィードバックのみ横スタッター
      if(cell.small){o.dx*=0.3;o.dy*=0.3;o.rot*=0.55;}  // ステートメントは移動量を抑える（縦の前傾はそのまま）
      const popS=Math.max(0,Math.sin(time*POP_SPEED - cell.k*POP_STEP));
      const pop=1 + POP_AMP*popS*popS;   // 鋭めのピーク＝一文字ずつ手前にせり出す
      cell.o.style.transform="translate("+o.dx.toFixed(2)+"px,"+o.dy.toFixed(2)+"px) rotate("+o.rot.toFixed(2)+"deg) scale("+pop.toFixed(3)+")";
      cell.i.style.transform="scaleY("+o.syb.toFixed(4)+")";
    }
    requestAnimationFrame(headbang);
  }
  if(!reduce) requestAnimationFrame(headbang);   // 文字ヘドバン起動（縦バラ＋首振り回転）

  // robust autoplay on mobile (muted inline). poster は自動再生がブロックされても黒くならない保険。
  clip.muted=true; clip.playsInline=true; clip.setAttribute("muted","");
  function tryPlay(){ const p=clip.play(); if(p&&p.catch) p.catch(()=>{}); }
  ["loadeddata","canplay","canplaythrough"].forEach(ev=>clip.addEventListener(ev,tryPlay));
  tryPlay();
  window.addEventListener("touchstart",tryPlay,{once:true});
  window.addEventListener("click",tryPlay,{once:true});
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) tryPlay(); });

  function enter(){
    const warn = document.getElementById("warn");
    const BK = reduce?10:420, HOLD = reduce?1200:2200;
    wipeK.classList.remove("run");void wipeK.offsetWidth;wipeK.classList.add("run");           // 黒：上→下
    setTimeout(()=>{ wipeB.classList.remove("run");void wipeB.offsetWidth;wipeB.classList.add("run"); if(warn)warn.classList.add("show"); }, BK); // 青の全面表示と同時に注意文を中央表示
    setTimeout(()=>{ location.href = DEST; }, BK+HOLD); // 注意文を読む時間をとってから遷移
  }
  ref.addEventListener("click",enter);
})();
</script>
